<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>今日のやること3つだけ（履歴クリア対応）</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{--bg:#ffffff;--card:#f6f7fb;--accent:#4f46e5;--text:#111827}
  html,body{height:100%;margin:0;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;color:var(--text)}
  .wrap{max-width:520px;margin:28px auto;padding:18px}
  h2{margin:0 0 8px 0;font-size:20px}
  .meta{display:flex;gap:12px;align-items:center;margin-bottom:12px}
  .streak{background:linear-gradient(90deg,#f97316,#fb7185);color:#fff;padding:8px 12px;border-radius:999px;font-weight:700}
  .historyBtn{margin-left:auto;background:#eef2ff;border:0;padding:8px 10px;border-radius:8px;font-weight:700}
  .hint{color:#6b7280;font-size:13px;margin-bottom:12px}
  input{width:100%;padding:12px;border-radius:10px;border:1px solid #e6e9ef;font-size:16px;box-sizing:border-box}
  .controls{display:flex;gap:8px;margin-top:10px}
  .controls button{flex:1;padding:12px;border-radius:10px;border:0;background:var(--accent);color:#fff;font-weight:600;font-size:16px}
  .controls button.secondary{background:#e6e9ef;color:#111}
  #taskList{margin-top:18px;display:flex;flex-direction:column;gap:10px}
  .task{display:flex;align-items:center;justify-content:space-between;padding:14px;border-radius:12px;background:var(--card);box-shadow:0 6px 18px rgba(15,23,42,0.04);transform-origin:center;overflow:hidden}
  .task .text{font-size:16px;flex:1;margin-right:12px;word-break:break-word}
  .task button{border:0;background:linear-gradient(90deg,#10b981,#06b6d4);color:#fff;padding:8px 12px;border-radius:10px;font-weight:700}
  .pop{animation: popScale 220ms cubic-bezier(.2,.9,.3,1)}
  @keyframes popScale{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
  .fadeUp{animation: fadeUp 520ms cubic-bezier(.2,.9,.3,1) forwards}
  @keyframes fadeUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:0.9;transform:translateY(-8px) scale(0.98)}100%{opacity:0;transform:translateY(-36px) scale(0.92)}}
  #confettiCanvas{position:fixed;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:9999}
  .badge{position:fixed;right:18px;bottom:18px;background:linear-gradient(90deg,#f97316,#fb7185);color:#fff;padding:10px 14px;border-radius:999px;font-weight:700;box-shadow:0 8px 30px rgba(251,113,133,0.18);transform-origin:center;opacity:0;pointer-events:none;z-index:10000}
  .badge.show{animation: badgeIn 700ms cubic-bezier(.2,.9,.3,1) forwards}
  @keyframes badgeIn{0%{opacity:0;transform:translateY(18px) scale(.9)}60%{opacity:1;transform:translateY(-6px) scale(1.05)}100%{opacity:1;transform:translateY(0) scale(1)}}
  .celebrateMsg{position:fixed;left:50%;top:20%;transform:translateX(-50%);background:linear-gradient(90deg,#06b6d4,#4f46e5);color:#fff;padding:18px 22px;border-radius:14px;font-weight:800;font-size:18px;box-shadow:0 20px 50px rgba(79,70,229,0.18);z-index:10001;opacity:0;pointer-events:none}
  .celebrateMsg.show{animation: celebrateIn 900ms cubic-bezier(.2,.9,.3,1) forwards}
  @keyframes celebrateIn{0%{opacity:0;transform:translate(-50%,-10px) scale(.96)}60%{opacity:1;transform:translate(-50%,6px) scale(1.03)}100%{opacity:1;transform:translate(-50%,0) scale(1)}}
  .comboBubble{position:fixed;left:50%;bottom:110px;transform:translateX(-50%);background:linear-gradient(90deg,#06b6d4,#4f46e5);color:#fff;padding:8px 12px;border-radius:999px;font-weight:800;z-index:10003;opacity:0;pointer-events:none}
  .comboBubble.show{animation: comboIn 420ms cubic-bezier(.2,.9,.3,1) forwards}
  @keyframes comboIn{0%{opacity:0;transform:translate(-50%,6px) scale(.96)}60%{opacity:1;transform:translate(-50%,-6px) scale(1.06)}100%{opacity:1;transform:translate(-50%,0) scale(1)}}
  .historyPanel{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:92%;max-width:420px;background:#fff;border-radius:12px;padding:16px;box-shadow:0 20px 50px rgba(2,6,23,0.12);z-index:10002;display:none}
  .historyPanel.show{display:block}
  .historyList{max-height:320px;overflow:auto;margin-top:8px}
  .historyRow{display:flex;justify-content:space-between;padding:8px 6px;border-bottom:1px solid #f1f5f9}
  .historyControls{display:flex;gap:8px;margin-top:10px}
  .historyControls button{flex:1;padding:10px;border-radius:10px;border:0;background:#eef2ff;font-weight:700}
  .closeBtn{margin-top:12px;background:#eef2ff;border:0;padding:10px;border-radius:10px;font-weight:700;width:100%}
  @media (max-width:420px){.wrap{padding:14px}.controls button{font-size:15px;padding:10px}}
</style>
</head>
<body>
<div class="wrap">
  <h2>今日のやること3つだけ</h2>
  <div class="meta">
    <div class="streak" id="streak">連続: 0日</div>
    <div class="hint">タスクは3つまで。完了すると気持ちよく消えます。</div>
    <button class="historyBtn" id="openHistory">履歴</button>
  </div>

  <input id="taskInput" type="text" placeholder="タスクを入力（例：メール返信）">
  <div class="controls">
    <button id="addBtn">追加</button>
    <button id="clearBtn" class="secondary">全クリア</button>
  </div>

  <div id="taskList" aria-live="polite"></div>
</div>

<canvas id="confettiCanvas"></canvas>
<div id="badge" class="badge">Nice! <span style="margin-left:8px;background:rgba(255,255,255,0.12);padding:6px 10px;border-radius:999px;font-weight:700">完了</span></div>
<div id="celebrate" class="celebrateMsg">おめでとう！今日の3つを達成しました</div>
<div id="comboBubble" class="comboBubble"></div>

<div id="historyPanel" class="historyPanel" role="dialog" aria-modal="true" aria-labelledby="historyTitle">
  <h3 id="historyTitle">完了履歴</h3>
  <div id="historySummary" style="margin-top:6px;color:#6b7280;font-size:13px"></div>
  <div class="historyList" id="historyList"></div>
  <div class="historyControls">
    <button id="clearHistoryBtn">履歴をクリア</button>
    <button id="clearHistoryAndStatsBtn">履歴と最高コンボをクリア</button>
  </div>
  <button id="closeHistory" class="closeBtn">閉じる</button>
</div>

<script>
/* データ構造
storage: { tasks:[], history:[{date,completed}], stats:{maxCombo: number} }
*/
const STORAGE_KEY = 'todo3_data';
const maxTasks = 3;
const taskListEl = document.getElementById('taskList');
const inputEl = document.getElementById('taskInput');
const addBtn = document.getElementById('addBtn');
const clearBtn = document.getElementById('clearBtn');
const badge = document.getElementById('badge');
const celebrate = document.getElementById('celebrate');
const streakEl = document.getElementById('streak');
const openHistory = document.getElementById('openHistory');
const historyPanel = document.getElementById('historyPanel');
const historyList = document.getElementById('historyList');
const historySummary = document.getElementById('historySummary');
const closeHistory = document.getElementById('closeHistory');
const clearHistoryBtn = document.getElementById('clearHistoryBtn');
const clearHistoryAndStatsBtn = document.getElementById('clearHistoryAndStatsBtn');
const comboBubble = document.getElementById('comboBubble');

addBtn.addEventListener('click', addTask);
inputEl.addEventListener('keydown', e => { if(e.key === 'Enter') addTask(); });
clearBtn.addEventListener('click', () => { if(confirm('全てのタスクと履歴を消しますか？')) { saveData({tasks:[], history:[], stats:{maxCombo:0}}); renderAll(); }});
openHistory.addEventListener('click', showHistory);
closeHistory.addEventListener('click', ()=> historyPanel.classList.remove('show'));
clearHistoryBtn.addEventListener('click', clearHistoryOnly);
clearHistoryAndStatsBtn.addEventListener('click', clearHistoryAndStats);

window.addEventListener('load', () => { renderAll(); });

/* コンボ管理 */
let combo = 0;
let comboTimer = null;
const COMBO_RESET_MS = 3000; // この時間内に次の完了が来れば連続扱い

/* 保存と読み出し */
function loadData(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"tasks":[],"history":[],"stats":{"maxCombo":0}}');
  }catch(e){
    return {tasks:[], history:[], stats:{maxCombo:0}};
  }
}
function saveData(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

/* 全体レンダリング */
function renderAll(){
  const data = loadData();
  taskListEl.innerHTML = '';
  data.tasks.forEach(t => addTaskToDOM(t));
  updateStreakAndSummary();
}

/* タスク追加 */
function addTask(){
  const text = inputEl.value.trim();
  if(!text) return;
  const data = loadData();
  if(data.tasks.length >= maxTasks){
    flashLimit();
    return;
  }
  data.tasks.push(text);
  saveData(data);
  addTaskToDOM(text);
  inputEl.value = '';
  inputEl.focus();
}

/* DOM追加 */
function addTaskToDOM(text){
  const div = document.createElement('div');
  div.className = 'task';
  const span = document.createElement('div');
  span.className = 'text';
  span.textContent = text;
  const btn = document.createElement('button');
  btn.textContent = '完了';
  btn.addEventListener('click', () => completeTask(div, text));
  div.appendChild(span);
  div.appendChild(btn);
  taskListEl.appendChild(div);
  div.classList.add('pop');
  setTimeout(()=>div.classList.remove('pop'), 300);
}

/* 完了処理 */
function completeTask(taskEl, text){
  taskEl.classList.add('pop');
  playClickTone();
  if(navigator.vibrate) navigator.vibrate([20,10,20]);

  // コンボ処理
  incrementCombo();

  // 紙吹雪（コンボに応じて量を増やす）
  const rect = taskEl.getBoundingClientRect();
  const origin = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
  const baseCount = 18;
  const confettiCount = Math.round(baseCount * (1 + combo * 0.6));
  confettiBurst(origin.x, origin.y, confettiCount);

  // フェードアップして削除
  taskEl.classList.add('fadeUp');
  setTimeout(() => {
    taskEl.remove();
    // データ更新
    const data = loadData();
    const idx = data.tasks.indexOf(text);
    if(idx !== -1) data.tasks.splice(idx,1);
    // 履歴更新: 今日の completed を +1
    const today = isoDate(new Date());
    let rec = data.history.find(h => h.date === today);
    if(!rec){ rec = {date: today, completed: 0}; data.history.push(rec); }
    rec.completed = (rec.completed || 0) + 1;
    // stats: maxCombo 更新
    if(!data.stats) data.stats = {maxCombo:0};
    if(combo > (data.stats.maxCombo || 0)) data.stats.maxCombo = combo;
    // 保存
    saveData(data);
    updateStreakAndSummary();
    showBadge();
    if(rec.completed === 3){
      celebrateAchievement();
    }
  }, 520);
}

/* コンボ増加と表示 */
function incrementCombo(){
  combo++;
  showComboBubble(combo);
  playComboTone(combo);
  if(comboTimer) clearTimeout(comboTimer);
  comboTimer = setTimeout(() => {
    combo = 0;
    comboTimer = null;
  }, COMBO_RESET_MS);
}

/* コンボバブル表示 */
let comboTimerHide = null;
function showComboBubble(n){
  comboBubble.textContent = `Combo ×${n}!`;
  comboBubble.classList.add('show');
  if(comboTimerHide) clearTimeout(comboTimerHide);
  comboTimerHide = setTimeout(()=> comboBubble.classList.remove('show'), 1200);
}

/* 連続日数と履歴サマリ更新 */
function updateStreakAndSummary(){
  const data = loadData();
  data.history.sort((a,b)=> b.date.localeCompare(a.date));
  const streak = calcStreak(data.history);
  streakEl.textContent = `連続: ${streak}日`;
}

/* ストリーク計算 */
function calcStreak(history){
  if(!history || history.length===0) return 0;
  const map = {};
  history.forEach(h => map[h.date] = h.completed || 0);
  let count = 0;
  let d = new Date();
  while(true){
    const key = isoDate(d);
    if((map[key] || 0) >= 3){ count++; d.setDate(d.getDate()-1); }
    else break;
  }
  return count;
}

/* 履歴パネル表示 */
function showHistory(){
  const data = loadData();
  data.history.sort((a,b)=> b.date.localeCompare(a.date));
  historyList.innerHTML = '';
  if(data.history.length === 0){
    historyList.innerHTML = '<div style="color:#6b7280;padding:8px">履歴がありません</div>';
  } else {
    data.history.forEach(h => {
      const row = document.createElement('div');
      row.className = 'historyRow';
      const d = document.createElement('div');
      d.textContent = h.date;
      const c = document.createElement('div');
      c.textContent = `${h.completed} / 3`;
      row.appendChild(d); row.appendChild(c);
      historyList.appendChild(row);
    });
  }
  const totalDays = data.history.length;
  const totalCompletions = data.history.reduce((s,h)=> s + (h.completed||0), 0);
  const maxCombo = (data.stats && data.stats.maxCombo) ? data.stats.maxCombo : 0;
  historySummary.textContent = `記録日数: ${totalDays}日  合計完了数: ${totalCompletions}  最高コンボ: ${maxCombo}`;
  historyPanel.classList.add('show');
}

/* 履歴だけをクリア */
function clearHistoryOnly(){
  if(!confirm('完了履歴を消しますか？（この操作は取り消せません）')) return;
  const data = loadData();
  data.history = [];
  saveData(data);
  showHistory(); // 更新表示
  updateStreakAndSummary();
  alert('完了履歴を消去しました');
}

/* 履歴と最高コンボをクリア */
function clearHistoryAndStats(){
  if(!confirm('完了履歴と最高コンボを両方消しますか？（この操作は取り消せません）')) return;
  const data = loadData();
  data.history = [];
  if(!data.stats) data.stats = {};
  data.stats.maxCombo = 0;
  saveData(data);
  showHistory();
  updateStreakAndSummary();
  alert('履歴と最高コンボを消去しました');
}

/* 制限到達時のフィードバック */
function flashLimit(){
  addBtn.animate([{transform:'translateY(0)'},{transform:'translateY(-6px)'},{transform:'translateY(0)'}],{duration:300,easing:'cubic-bezier(.2,.9,.3,1)'});
  playErrorTone();
}

/* バッジ表示 */
let badgeTimer = null;
function showBadge(){
  badge.classList.add('show');
  if(badgeTimer) clearTimeout(badgeTimer);
  badgeTimer = setTimeout(()=>badge.classList.remove('show'), 1200);
}

/* 称賛処理 */
function celebrateAchievement(){
  playCelebrateTone();
  if(navigator.vibrate) navigator.vibrate([30,20,30,20,40]);
  const data = loadData();
  const currentCombo = combo || 1;
  const confettiCount = Math.round(60 * (1 + currentCombo * 0.5));
  confettiBurst(window.innerWidth/2, window.innerHeight/3, confettiCount);
  celebrate.classList.add('show');
  setTimeout(()=> celebrate.classList.remove('show'), 2200);
  const streak = calcStreak(data.history);
  streakEl.textContent = `連続: ${streak}日`;
}

/* 日付フォーマット YYYY-MM-DD */
function isoDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

/* -------------------------
   Confetti（軽量自作）
   ------------------------- */
const canvas = document.getElementById('confettiCanvas');
const ctx = canvas.getContext('2d');
let confettiParticles = [];
let confettiRunning = false;
function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function confettiBurst(x, y, count){
  const colors = ['#ef4444','#f97316','#f59e0b','#10b981','#06b6d4','#3b82f6','#8b5cf6','#ec4899'];
  for(let i=0;i<count;i++){
    confettiParticles.push({
      x: x,
      y: y,
      vx: (Math.random()-0.5) * (4 + Math.random()*8),
      vy: - (4 + Math.random()*6),
      size: 6 + Math.random()*10,
      rot: Math.random()*360,
      vr: (Math.random()-0.5)*12,
      color: colors[Math.floor(Math.random()*colors.length)],
      life: 60 + Math.random()*60
    });
  }
  if(!confettiRunning){ confettiRunning = true; requestAnimationFrame(confettiLoop); }
}

function confettiLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let i=confettiParticles.length-1;i>=0;i--){
    const p = confettiParticles[i];
    p.life--;
    p.vy += 0.18;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vr;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
    ctx.restore();
    if(p.life <= 0 || p.y > canvas.height + 50) confettiParticles.splice(i,1);
  }
  if(confettiParticles.length>0) requestAnimationFrame(confettiLoop);
  else confettiRunning = false;
}

/* -------------------------
   効果音（コンボ対応）
   ------------------------- */
function playClickTone(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = 880;
    g.gain.value = 0.0001;
    o.connect(g); g.connect(ctx.destination);
    const now = ctx.currentTime;
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
    o.start(now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
    o.stop(now + 0.19);
  }catch(e){}
}
function playErrorTone(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'triangle'; o.frequency.value = 220;
    o.connect(g); g.connect(ctx.destination);
    const now = ctx.currentTime;
    g.gain.exponentialRampToValueAtTime(0.06, now + 0.02);
    o.start(now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
    o.stop(now + 0.2);
  }catch(e){}
}
function playCelebrateTone(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o1 = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    const g = ctx.createGain();
    o1.type='sine'; o2.type='sine';
    o1.frequency.value = 660; o2.frequency.value = 880;
    g.gain.value = 0.0001;
    o1.connect(g); o2.connect(g); g.connect(ctx.destination);
    const now = ctx.currentTime;
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.12, now + 0.02);
    o1.start(now); o2.start(now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
    o1.stop(now + 0.52); o2.stop(now + 0.52);
  }catch(e){}
}
function playComboTone(comboCount){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    const base = 520;
    const freq = base + Math.min(comboCount-1, 8) * 80;
    o.frequency.value = freq;
    g.gain.value = 0.0001;
    o.connect(g); g.connect(ctx.destination);
    const now = ctx.currentTime;
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
    o.start(now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
    o.stop(now + 0.24);
  }catch(e){}
}
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>
